<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechQuest — Módulo 4: Rede</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --blue-dark: #0D1B2A;
      --blue-mid: #1A3A5C;
      --blue: #1E6FBF;
      --blue-light: #4A9EE0;
      --orange: #F7732A;
      --orange-light: #FFAD6F;
      --white: #F4F8FF;
      --gray: #8BA3BC;
      --card-bg: #162840;
      --green: #1AB078;
      --red: #E8445A;
      --teal: #0ABFBC;
      --teal-dark: #077B79
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent
    }

    body {
      background: var(--blue-dark);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden
    }

    .bg-pattern {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: radial-gradient(circle at 80% 10%, rgba(10, 191, 188, .2) 0%, transparent 50%), radial-gradient(circle at 10% 80%, rgba(30, 111, 191, .15) 0%, transparent 45%)
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: linear-gradient(rgba(10, 191, 188, .05) 1px, transparent 1px), linear-gradient(90deg, rgba(10, 191, 188, .05) 1px, transparent 1px);
      background-size: 32px 32px
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 430px;
      margin: 0 auto;
      padding: 0 20px 56px
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 0 12px
    }

    .btn-back {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--card-bg);
      border: 1px solid rgba(10, 191, 188, .2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0
    }

    .topbar-info {
      flex: 1
    }

    .topbar-label {
      font-size: 11px;
      color: var(--gray);
      letter-spacing: 1px;
      text-transform: uppercase
    }

    .topbar-title {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700
    }

    .topbar-badge {
      font-size: 11px;
      font-weight: 600;
      background: rgba(10, 191, 188, .15);
      color: var(--teal);
      border: 1px solid rgba(10, 191, 188, .3);
      padding: 4px 10px;
      border-radius: 20px
    }

    .progress-wrap {
      margin-bottom: 14px
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--gray);
      margin-bottom: 7px
    }

    .progress-meta strong {
      color: var(--white)
    }

    .progress-track {
      height: 6px;
      background: var(--card-bg);
      border-radius: 99px;
      overflow: hidden
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--teal-dark), var(--teal));
      border-radius: 99px;
      transition: width .5s cubic-bezier(.4, 0, .2, 1)
    }

    .etapa-steps {
      display: flex;
      gap: 6px;
      margin-bottom: 18px
    }

    .etapa-dot {
      flex: 1;
      height: 4px;
      border-radius: 99px;
      background: var(--card-bg);
      transition: background .4s
    }

    .etapa-dot.active {
      background: var(--teal)
    }

    .etapa-dot.done {
      background: var(--green)
    }

    .section-eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--teal);
      text-transform: uppercase;
      margin-bottom: 6px
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 8px
    }

    .section-desc {
      font-size: 13px;
      color: var(--gray);
      line-height: 1.6;
      margin-bottom: 18px
    }

    /* QUIZ */
    .question-card {
      background: var(--card-bg);
      border: 1px solid rgba(10, 191, 188, .15);
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 14px;
      animation: fadeUp .35s ease both
    }

    .question-chip {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: var(--teal);
      text-transform: uppercase;
      background: rgba(10, 191, 188, .1);
      border: 1px solid rgba(10, 191, 188, .2);
      padding: 3px 10px;
      border-radius: 99px;
      margin-bottom: 12px
    }

    .question-illustration {
      display: flex;
      justify-content: center;
      background: rgba(13, 27, 42, .6);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 14px
    }

    .question-text {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 4px
    }

    .question-hint {
      font-size: 12px;
      color: var(--gray);
      margin-bottom: 4px
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 14px
    }

    .option {
      background: rgba(26, 58, 92, .4);
      border: 1.5px solid rgba(10, 191, 188, .15);
      border-radius: 13px;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      user-select: none
    }

    .option.correct {
      border-color: var(--green);
      background: rgba(26, 176, 120, .12);
      animation: pulse-green .35s ease
    }

    .option.wrong {
      border-color: var(--red);
      background: rgba(232, 68, 90, .1);
      animation: shake .3s ease
    }

    .option.disabled {
      pointer-events: none;
      opacity: .5
    }

    .option.correct.disabled,
    .option.wrong.disabled {
      opacity: 1
    }

    .option-letter {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      flex-shrink: 0;
      background: rgba(10, 191, 188, .1);
      border: 1px solid rgba(10, 191, 188, .2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--teal)
    }

    .option.correct .option-letter {
      background: var(--green);
      color: #fff;
      border-color: var(--green)
    }

    .option.wrong .option-letter {
      background: var(--red);
      color: #fff;
      border-color: var(--red)
    }

    .option-text {
      font-size: 14px;
      font-weight: 500
    }

    .feedback-box {
      border-radius: 14px;
      padding: 14px 16px;
      margin-top: 12px;
      display: none;
      animation: fadeUp .3s ease both
    }

    .feedback-box.correct {
      background: rgba(26, 176, 120, .1);
      border: 1px solid rgba(26, 176, 120, .3)
    }

    .feedback-box.wrong {
      background: rgba(232, 68, 90, .08);
      border: 1px solid rgba(232, 68, 90, .3)
    }

    .feedback-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px
    }

    .feedback-header strong {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700
    }

    .feedback-box.correct .feedback-header strong {
      color: var(--green)
    }

    .feedback-box.wrong .feedback-header strong {
      color: var(--red)
    }

    .feedback-text {
      font-size: 13px;
      color: var(--gray);
      line-height: 1.6
    }

    /* TOPOLOGIA */
    .topo-wrap {
      background: var(--card-bg);
      border: 1px solid rgba(10, 191, 188, .15);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 14px
    }

    .topo-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--gray);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .topo-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(10, 191, 188, .12)
    }

    #topo-svg {
      width: 100%;
      max-width: 380px;
      display: block;
      margin: 0 auto
    }

    .instr-card {
      background: var(--card-bg);
      border: 1px solid rgba(10, 191, 188, .2);
      border-radius: 16px;
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
      animation: fadeUp .35s ease both
    }

    .instr-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: rgba(10, 191, 188, .15);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0
    }

    .instr-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: var(--teal);
      text-transform: uppercase;
      margin-bottom: 3px
    }

    .instr-text {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35
    }

    .instr-hint {
      font-size: 12px;
      color: var(--gray);
      margin-top: 4px;
      line-height: 1.5
    }

    .topo-opts-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--gray);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 10px
    }

    .topo-opts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px
    }

    .topo-opt {
      background: var(--card-bg);
      border: 1.5px solid rgba(10, 191, 188, .15);
      border-radius: 14px;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      text-align: center;
      transition: border-color .15s, background .15s, transform .1s;
      user-select: none
    }

    .topo-opt:active {
      transform: scale(.97)
    }

    .topo-opt:hover {
      border-color: rgba(10, 191, 188, .4);
      background: rgba(10, 191, 188, .06)
    }

    .topo-opt.correct {
      border-color: var(--green);
      background: rgba(26, 176, 120, .1);
      animation: pulse-green .35s ease
    }

    .topo-opt.wrong {
      border-color: var(--red);
      background: rgba(232, 68, 90, .08);
      animation: shake .3s ease
    }

    .topo-opt.disabled {
      pointer-events: none;
      opacity: .45
    }

    .topo-opt.correct.disabled {
      opacity: 1
    }

    .topo-opt-icon {
      width: 52px;
      height: 52px
    }

    .topo-opt-name {
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.25
    }

    /* IP CONFIG */
    .ip-scenario {
      background: var(--card-bg);
      border: 1px solid rgba(10, 191, 188, .15);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px
    }

    .ip-scenario-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: var(--teal);
      text-transform: uppercase;
      margin-bottom: 8px
    }

    .ip-scenario-text {
      font-size: 13px;
      color: var(--white);
      line-height: 1.6
    }

    .ip-fields {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 14px
    }

    .ip-field {
      background: var(--card-bg);
      border: 1px solid rgba(10, 191, 188, .15);
      border-radius: 14px;
      padding: 14px 16px
    }

    .ip-field-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--teal);
      text-transform: uppercase;
      margin-bottom: 10px
    }

    .ip-opts {
      display: flex;
      flex-wrap: wrap;
      gap: 8px
    }

    .ip-opt {
      background: rgba(10, 191, 188, .06);
      border: 1.5px solid rgba(10, 191, 188, .2);
      border-radius: 10px;
      padding: 8px 14px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--teal);
      cursor: pointer;
      transition: border-color .15s, background .15s;
      user-select: none
    }

    .ip-opt:hover {
      border-color: rgba(10, 191, 188, .5);
      background: rgba(10, 191, 188, .1)
    }

    .ip-opt.correct {
      border-color: var(--green);
      background: rgba(26, 176, 120, .12);
      color: var(--green)
    }

    .ip-opt.wrong {
      border-color: var(--red);
      background: rgba(232, 68, 90, .08);
      color: var(--red);
      animation: shake .3s ease
    }

    .ip-opt.disabled {
      pointer-events: none;
      opacity: .4
    }

    .ip-opt.correct.disabled {
      opacity: 1
    }

    .ip-field-feedback {
      font-size: 12px;
      margin-top: 8px;
      display: none;
      line-height: 1.5
    }

    .ip-field-feedback.show {
      display: block
    }

    .ip-field-feedback.ok {
      color: var(--green)
    }

    .ip-field-feedback.err {
      color: var(--red)
    }

    /* BOTÕES */
    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: var(--teal-dark);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      padding: 15px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(10, 191, 188, .25);
      transition: transform .15s;
      margin-bottom: 10px
    }

    .btn-primary:active {
      transform: scale(.98)
    }

    .btn-next {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: var(--blue);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 14px;
      border-radius: 13px;
      border: none;
      cursor: pointer;
      transition: transform .15s
    }

    .btn-next:active {
      transform: scale(.98)
    }

    .btn-next.show {
      display: flex;
      animation: fadeUp .3s ease both
    }

    .btn-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: var(--card-bg);
      color: var(--white);
      border: 1.5px solid rgba(10, 191, 188, .2);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 14px;
      border-radius: 13px;
      cursor: pointer
    }

    /* RESULTADO */
    #screen-result {
      display: none;
      animation: fadeUp .4s ease both
    }

    .result-hero {
      text-align: center;
      padding: 24px 0
    }

    .result-score-ring {
      position: relative;
      width: 140px;
      height: 140px;
      margin: 0 auto 20px
    }

    .result-score-ring svg {
      position: absolute;
      inset: 0;
      transform: rotate(-90deg)
    }

    .result-score-inner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center
    }

    .result-score-num {
      font-family: 'Syne', sans-serif;
      font-size: 38px;
      font-weight: 800;
      line-height: 1
    }

    .result-score-label {
      font-size: 11px;
      color: var(--gray);
      margin-top: 2px
    }

    .result-title {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px
    }

    .result-subtitle {
      font-size: 14px;
      color: var(--gray);
      line-height: 1.6;
      max-width: 280px;
      margin: 0 auto 24px
    }

    .result-breakdown {
      background: var(--card-bg);
      border: 1px solid rgba(10, 191, 188, .12);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 20px
    }

    .breakdown-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px
    }

    .breakdown-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(10, 191, 188, .06)
    }

    .breakdown-row:last-child {
      border-bottom: none
    }

    .breakdown-label {
      font-size: 13px;
      color: var(--gray)
    }

    .breakdown-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 99px
    }

    .breakdown-badge.ok {
      background: rgba(26, 176, 120, .15);
      color: var(--green)
    }

    .breakdown-badge.err {
      background: rgba(232, 68, 90, .12);
      color: var(--red)
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes pulse-green {
      0% {
        box-shadow: 0 0 0 0 rgba(26, 176, 120, .5)
      }

      70% {
        box-shadow: 0 0 0 10px rgba(26, 176, 120, 0)
      }

      100% {
        box-shadow: 0 0 0 0 rgba(26, 176, 120, 0)
      }
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0)
      }

      25% {
        transform: translateX(-6px)
      }

      75% {
        transform: translateX(6px)
      }
    }

    @keyframes snapIn {
      0% {
        opacity: 0;
        transform: scale(.3)
      }

      70% {
        transform: scale(1.1)
      }

      100% {
        opacity: 1;
        transform: scale(1)
      }
    }

    .snap-in {
      animation: snapIn .4s cubic-bezier(.4, 0, .2, 1) both
    }
  </style>
</head>

<body>
  <div class="bg-pattern"></div>
  <div class="bg-grid"></div>
  <div class="page">

    <div class="topbar">
      <div class="btn-back" onclick="goBack()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M11 4l-5 5 5 5" stroke="#0ABFBC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </div>
      <div class="topbar-info">
        <div class="topbar-label">Módulo 04</div>
        <div class="topbar-title">Conexão e Rede</div>
      </div>
      <div class="topbar-badge" id="badge-phase">Etapa 1/4</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-meta">
        <span id="prog-label">Questão <strong>1</strong> de <strong>6</strong></span>
        <span id="score-label">✓ 0 &nbsp;✗ 0</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="etapa-steps">
      <div class="etapa-dot active" id="dot-0"></div>
      <div class="etapa-dot" id="dot-1"></div>
      <div class="etapa-dot" id="dot-2"></div>
      <div class="etapa-dot" id="dot-3"></div>
    </div>

    <div id="screen-e1"></div>
    <div id="screen-e2" style="display:none"></div>
    <div id="screen-e3" style="display:none"></div>
    <div id="screen-e4" style="display:none"></div>

    <div id="screen-result">
      <div class="result-hero">
        <div class="result-score-ring">
          <svg width="140" height="140" viewBox="0 0 140 140">
            <circle cx="70" cy="70" r="58" stroke="#162840" stroke-width="12" fill="none" />
            <circle cx="70" cy="70" r="58" id="score-arc" stroke="#0ABFBC" stroke-width="12" fill="none"
              stroke-linecap="round" stroke-dasharray="364" stroke-dashoffset="364" />
          </svg>
          <div class="result-score-inner">
            <div class="result-score-num" id="result-num">0</div>
            <div class="result-score-label" id="result-den">de 19 acertos</div>
          </div>
        </div>
        <h2 class="result-title" id="result-title"></h2>
        <p class="result-subtitle" id="result-subtitle"></p>
      </div>
      <div class="result-breakdown">
        <div class="breakdown-title">Desempenho por etapa</div>
        <div id="breakdown-list"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <button class="btn-primary" onclick="init()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 8a5 5 0 1 1 1.5 3.5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" />
            <path d="M3 5v3h3" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          Tentar novamente
        </button>
        <button class="btn-secondary" onclick="goHome()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 6.5L8 2l6 4.5V14H10v-4H6v4H2z" stroke="#0ABFBC" stroke-width="1.6" stroke-linejoin="round"
              fill="none" />
          </svg>
          Voltar ao início
        </button>
      </div>
    </div>

  </div><!-- /page -->
  <script src="./assets/javascript/modulo04.js"></script>
</body>

</html>
