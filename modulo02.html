<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechQuest — Módulo 2: Montagem</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --blue-dark: #0D1B2A;
            --blue-mid: #1A3A5C;
            --blue: #1E6FBF;
            --blue-light: #4A9EE0;
            --orange: #F7732A;
            --orange-light: #FFAD6F;
            --white: #F4F8FF;
            --gray: #8BA3BC;
            --card-bg: #162840;
            --green: #1AB078;
            --red: #E8445A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--blue-dark);
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                radial-gradient(circle at 80% 10%, rgba(30, 111, 191, .25) 0%, transparent 50%),
                radial-gradient(circle at 10% 80%, rgba(247, 115, 42, .12) 0%, transparent 45%);
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(74, 158, 224, .06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(74, 158, 224, .06) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .page {
            position: relative;
            z-index: 1;
            max-width: 430px;
            margin: 0 auto;
            padding: 0 20px 48px;
        }

        /* TOPBAR */
        .topbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 18px 0 12px;
        }

        .btn-back {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--card-bg);
            border: 1px solid rgba(74, 158, 224, .15);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: background .15s;
        }

        .btn-back:active {
            background: var(--blue-mid);
        }

        .topbar-info {
            flex: 1;
        }

        .topbar-label {
            font-size: 11px;
            color: var(--gray);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .topbar-title {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
        }

        .topbar-badge {
            font-size: 11px;
            font-weight: 600;
            background: rgba(247, 115, 42, .15);
            color: var(--orange-light);
            border: 1px solid rgba(247, 115, 42, .3);
            padding: 4px 10px;
            border-radius: 20px;
        }

        /* PROGRESS */
        .progress-wrap {
            margin-bottom: 18px;
        }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--gray);
            margin-bottom: 7px;
        }

        .progress-meta strong {
            color: var(--white);
        }

        .progress-track {
            height: 6px;
            background: var(--card-bg);
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--orange), var(--orange-light));
            border-radius: 99px;
            transition: width .5s cubic-bezier(.4, 0, .2, 1);
        }

        /* INSTRUÇÃO */
        .instruction-card {
            background: var(--card-bg);
            border: 1px solid rgba(247, 115, 42, .2);
            border-radius: 16px;
            padding: 14px 16px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 14px;
            animation: fadeUp .35s ease both;
        }

        .instruction-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: rgba(247, 115, 42, .15);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .instruction-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            color: var(--orange);
            text-transform: uppercase;
            margin-bottom: 3px;
        }

        .instruction-text {
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            line-height: 1.35;
        }

        .instruction-hint {
            font-size: 12px;
            color: var(--gray);
            margin-top: 4px;
            line-height: 1.5;
        }

        /* PLACA-MÃE */
        .motherboard-wrap {
            background: var(--card-bg);
            border: 1px solid rgba(74, 158, 224, .15);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 14px;
            animation: fadeUp .35s .05s ease both;
        }

        .motherboard-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--gray);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .motherboard-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(74, 158, 224, .12);
        }

        #mb-svg {
            width: 100%;
            max-width: 380px;
            display: block;
            margin: 0 auto;
        }

        /* LEGENDA */
        .legend-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            color: var(--gray);
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        /* OPÇÕES DE COMPONENTES */
        .options-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--gray);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 10px;
            animation: fadeUp .35s .1s ease both;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
            animation: fadeUp .35s .15s ease both;
        }

        .opt-card {
            background: var(--card-bg);
            border: 1.5px solid rgba(74, 158, 224, .15);
            border-radius: 14px;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            text-align: center;
            transition: border-color .15s, background .15s, transform .1s;
            user-select: none;
        }

        .opt-card:active {
            transform: scale(.97);
        }

        .opt-card:hover {
            border-color: rgba(74, 158, 224, .4);
            background: rgba(30, 111, 191, .12);
        }

        .opt-card.correct {
            border-color: var(--green);
            background: rgba(26, 176, 120, .12);
            animation: pulse-green .35s ease;
        }

        .opt-card.wrong {
            border-color: var(--red);
            background: rgba(232, 68, 90, .1);
            animation: shake .3s ease;
        }

        .opt-card.disabled {
            pointer-events: none;
            opacity: .45;
        }

        .opt-card.correct.disabled {
            opacity: 1;
        }

        .opt-card-icon {
            width: 52px;
            height: 52px;
        }

        .opt-card-name {
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            font-weight: 700;
            line-height: 1.25;
        }

        /* FEEDBACK */
        .feedback-box {
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 14px;
            display: none;
            animation: fadeUp .3s ease both;
        }

        .feedback-box.correct {
            background: rgba(26, 176, 120, .12);
            border: 1px solid rgba(26, 176, 120, .3);
        }

        .feedback-box.wrong {
            background: rgba(232, 68, 90, .1);
            border: 1px solid rgba(232, 68, 90, .3);
        }

        .feedback-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
        }

        .feedback-header strong {
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
        }

        .feedback-box.correct .feedback-header strong {
            color: var(--green);
        }

        .feedback-box.wrong .feedback-header strong {
            color: var(--red);
        }

        .feedback-text {
            font-size: 13px;
            color: var(--gray);
            line-height: 1.6;
        }

        .btn-next {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            background: var(--blue);
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 14px;
            border-radius: 13px;
            border: none;
            cursor: pointer;
            transition: transform .15s;
        }

        .btn-next:active {
            transform: scale(.98);
        }

        .btn-next.show {
            display: flex;
            animation: fadeUp .3s ease both;
        }

        /* RESULTADO FINAL */
        #screen-result {
            display: none;
            animation: fadeUp .4s ease both;
        }

        .result-hero {
            text-align: center;
            padding: 24px 0;
        }

        .result-score-ring {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 20px;
        }

        .result-score-ring svg {
            position: absolute;
            inset: 0;
            transform: rotate(-90deg);
        }

        .result-score-inner {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .result-score-num {
            font-family: 'Syne', sans-serif;
            font-size: 38px;
            font-weight: 800;
            line-height: 1;
        }

        .result-score-label {
            font-size: 11px;
            color: var(--gray);
            margin-top: 2px;
        }

        .result-title {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .result-subtitle {
            font-size: 14px;
            color: var(--gray);
            line-height: 1.6;
            max-width: 280px;
            margin: 0 auto 24px;
        }

        .result-breakdown {
            background: var(--card-bg);
            border: 1px solid rgba(74, 158, 224, .12);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .breakdown-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .breakdown-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 0;
            border-bottom: 1px solid rgba(74, 158, 224, .06);
        }

        .breakdown-row:last-child {
            border-bottom: none;
        }

        .breakdown-icon {
            width: 32px;
            height: 32px;
            flex-shrink: 0;
        }

        .breakdown-info {
            flex: 1;
        }

        .breakdown-name {
            font-size: 13px;
            font-weight: 600;
        }

        .breakdown-slot {
            font-size: 11px;
            color: var(--gray);
        }

        .breakdown-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 99px;
        }

        .breakdown-badge.ok {
            background: rgba(26, 176, 120, .15);
            color: var(--green);
        }

        .breakdown-badge.err {
            background: rgba(232, 68, 90, .12);
            color: var(--red);
        }

        .result-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-primary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: var(--orange);
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            padding: 15px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(247, 115, 42, .35);
            transition: transform .15s;
        }

        .btn-primary:active {
            transform: scale(.98);
        }

        .btn-secondary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            background: var(--card-bg);
            color: var(--white);
            border: 1.5px solid rgba(74, 158, 224, .2);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            padding: 14px;
            border-radius: 13px;
            cursor: pointer;
            transition: background .15s;
        }

        .btn-secondary:active {
            background: var(--blue-mid);
        }

        /* ANIMATIONS */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(14px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse-green {
            0% {
                box-shadow: 0 0 0 0 rgba(26, 176, 120, .5);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(26, 176, 120, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(26, 176, 120, 0);
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-6px);
            }

            75% {
                transform: translateX(6px);
            }
        }

        @keyframes snapIn {
            0% {
                opacity: 0;
                transform: scale(.4);
            }

            70% {
                transform: scale(1.1);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .snap-in {
            animation: snapIn .45s cubic-bezier(.4, 0, .2, 1) both;
        }
    </style>
</head>

<body>
    <div class="bg-pattern"></div>
    <div class="bg-grid"></div>

    <div class="page">

        <!-- TOPBAR -->
        <div class="topbar">
            <div class="btn-back" onclick="goBack()">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                    <path d="M11 4l-5 5 5 5" stroke="#4A9EE0" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </div>
            <div class="topbar-info">
                <div class="topbar-label">Módulo 02</div>
                <div class="topbar-title">Montagem na Placa-mãe</div>
            </div>
            <div class="topbar-badge" id="badge-step">Etapa 1/6</div>
        </div>

        <!-- PROGRESS -->
        <div class="progress-wrap">
            <div class="progress-meta">
                <span>Etapa <strong id="step-current">1</strong> de <strong>6</strong></span>
                <span id="step-score-label">✓ 0 &nbsp;✗ 0</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progress-fill" style="width:0%"></div>
            </div>
        </div>

        <!-- TELA JOGO -->
        <div id="screen-game">

            <!-- INSTRUÇÃO -->
            <div class="instruction-card" id="instruction-card">
                <div class="instruction-icon" id="instr-icon">
                    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                        <circle cx="11" cy="11" r="9" stroke="#F7732A" stroke-width="2" />
                        <path d="M11 7v5l3 3" stroke="#F7732A" stroke-width="1.8" stroke-linecap="round" />
                    </svg>
                </div>
                <div>
                    <div class="instruction-label">Barramento destacado</div>
                    <div class="instruction-text" id="instr-text">Carregando...</div>
                    <div class="instruction-hint" id="instr-hint"></div>
                </div>
            </div>

            <!-- PLACA-MÃE -->
            <div class="motherboard-wrap">
                <div class="motherboard-title">Placa-mãe</div>
                <svg id="mb-svg" viewBox="0 0 340 300" fill="none" xmlns="http://www.w3.org/2000/svg">

                    <!-- PCB base -->
                    <rect x="4" y="4" width="332" height="292" rx="10" fill="#0D2B1A" stroke="#1E6FBF"
                        stroke-width="1.5" />

                    <!-- trilhas horizontais -->
                    <line x1="4" y1="80" x2="336" y2="80" stroke="#1E6FBF" stroke-width=".4" opacity=".25" />
                    <line x1="4" y1="140" x2="336" y2="140" stroke="#1E6FBF" stroke-width=".4" opacity=".25" />
                    <line x1="4" y1="200" x2="336" y2="200" stroke="#1E6FBF" stroke-width=".4" opacity=".25" />
                    <line x1="4" y1="260" x2="336" y2="260" stroke="#1E6FBF" stroke-width=".4" opacity=".25" />
                    <!-- trilhas verticais -->
                    <line x1="80" y1="4" x2="80" y2="296" stroke="#1E6FBF" stroke-width=".4" opacity=".25" />
                    <line x1="160" y1="4" x2="160" y2="296" stroke="#1E6FBF" stroke-width=".4" opacity=".25" />
                    <line x1="240" y1="4" x2="240" y2="296" stroke="#1E6FBF" stroke-width=".4" opacity=".25" />

                    <!-- ══ SLOT: Socket CPU ══ -->
                    <g id="slot-cpu">
                        <rect x="20" y="20" width="90" height="90" rx="6" fill="#0A1F12" stroke="#4A9EE0"
                            stroke-width="1.5" stroke-dasharray="4 3" />
                        <!-- pinos -->
                        <g opacity=".5">
                            <rect x="30" y="26" width="2" height="4" rx="1" fill="#4A9EE0" />
                            <rect x="37" y="26" width="2" height="4" rx="1" fill="#4A9EE0" />
                            <rect x="44" y="26" width="2" height="4" rx="1" fill="#4A9EE0" />
                            <rect x="51" y="26" width="2" height="4" rx="1" fill="#4A9EE0" />
                            <rect x="58" y="26" width="2" height="4" rx="1" fill="#4A9EE0" />
                            <rect x="65" y="26" width="2" height="4" rx="1" fill="#4A9EE0" />
                            <rect x="72" y="26" width="2" height="4" rx="1" fill="#4A9EE0" />
                            <rect x="79" y="26" width="2" height="4" rx="1" fill="#4A9EE0" />
                            <rect x="86" y="26" width="2" height="4" rx="1" fill="#4A9EE0" />
                            <rect x="30" y="98" width="2" height="4" rx="1" fill="#4A9EE0" />
                            <rect x="37" y="98" width="2" height="4" rx="1" fill="#4A9EE0" />
                            <rect x="44" y="98" width="2" height="4" rx="1" fill="#4A9EE0" />
                            <rect x="51" y="98" width="2" height="4" rx="1" fill="#4A9EE0" />
                            <rect x="58" y="98" width="2" height="4" rx="1" fill="#4A9EE0" />
                            <rect x="65" y="98" width="2" height="4" rx="1" fill="#4A9EE0" />
                        </g>
                        <text x="65" y="68" text-anchor="middle" font-size="9" fill="#4A9EE0" font-family="DM Sans"
                            font-weight="600" opacity=".7">Socket CPU</text>
                    </g>
                    <!-- componente encaixado CPU -->
                    <g id="placed-cpu" display="none">
                        <rect x="22" y="22" width="86" height="86" rx="5" fill="#F7732A" opacity=".9" class="snap-in" />
                        <rect x="28" y="28" width="74" height="74" rx="3" fill="#0D1B2A" />
                        <text x="65" y="72" text-anchor="middle" font-size="11" fill="#F7732A" font-family="Syne"
                            font-weight="800">CPU</text>
                    </g>

                    <!-- ══ SLOT: RAM x2 ══ -->
                    <g id="slot-ram">
                        <rect x="124" y="14" width="14" height="80" rx="3" fill="#0A1F12" stroke="#4A9EE0"
                            stroke-width="1.5" stroke-dasharray="4 3" />
                        <rect x="142" y="14" width="14" height="80" rx="3" fill="#0A1F12" stroke="#4A9EE0"
                            stroke-width="1.5" stroke-dasharray="4 3" />
                        <text x="158" y="105" text-anchor="end" font-size="8" fill="#4A9EE0" font-family="DM Sans"
                            font-weight="600" opacity=".7">Slots RAM</text>
                    </g>
                    <!-- componente encaixado RAM -->
                    <g id="placed-ram" display="none">
                        <rect x="124" y="14" width="14" height="80" rx="3" fill="#4A9EE0" class="snap-in" />
                        <rect x="142" y="14" width="14" height="80" rx="3" fill="#4A9EE0" class="snap-in" />
                        <rect x="126" y="18" width="10" height="8" rx="1.5" fill="#0D1B2A" />
                        <rect x="126" y="28" width="10" height="8" rx="1.5" fill="#0D1B2A" />
                        <rect x="126" y="38" width="10" height="8" rx="1.5" fill="#0D1B2A" />
                        <rect x="144" y="18" width="10" height="8" rx="1.5" fill="#0D1B2A" />
                        <rect x="144" y="28" width="10" height="8" rx="1.5" fill="#0D1B2A" />
                        <rect x="144" y="38" width="10" height="8" rx="1.5" fill="#0D1B2A" />
                    </g>

                    <!-- ══ SLOT: PCIe ══ -->
                    <g id="slot-pcie">
                        <rect x="20" y="190" width="200" height="16" rx="3" fill="#0A1F12" stroke="#4A9EE0"
                            stroke-width="1.5" stroke-dasharray="4 3" />
                        <text x="20" y="220" font-size="8" fill="#4A9EE0" font-family="DM Sans" font-weight="600"
                            opacity=".7">Slot PCIe x16</text>
                    </g>
                    <!-- componente encaixado PCIe (GPU) -->
                    <g id="placed-pcie" display="none">
                        <rect x="20" y="175" width="200" height="50" rx="5" fill="#162840" stroke="#4A9EE0"
                            stroke-width="1" class="snap-in" />
                        <rect x="26" y="180" width="60" height="40" rx="4" fill="#0D1B2A" stroke="#4A9EE0"
                            stroke-width="1" />
                        <circle cx="56" cy="200" r="12" fill="#4A9EE0" opacity=".5" />
                        <circle cx="56" cy="200" r="5" fill="#0D1B2A" />
                        <rect x="100" y="182" width="110" height="36" rx="3" fill="#0D1B2A" />
                        <rect x="104" y="186" width="14" height="10" rx="2" fill="#4A9EE0" opacity=".6" />

                hint: 'Os conectores SATA ficam na borda da placa-mãe. São usados para ligar HDs e SSDs SATA com um cabo em formato de "L".',

                options: [
                    {

                    },
                    {
                        name: 'Cooler', color: '#8BA3BC',
                        svg: `<svg viewBox="0 0 52 52" fill="none"><circle cx="26" cy="26" r="18" fill="#162840" stroke="#8BA3BC" stroke-width="1.5"/><circle cx="26" cy="26" r="8" fill="#1A3A5C"/><circle cx="26" cy="26" r="3" fill="#8BA3BC"/><path d="M26 26 Q30 16 26 10" stroke="#8BA3BC" stroke-width="2" stroke-linecap="round" fill="none"/><path d="M26 26 Q36 26 42 22" stroke="#8BA3BC" stroke-width="2" stroke-linecap="round" fill="none"/></svg>`
                    }
                ],
                feedback: {
                    correct: 'Cabo SATA conectado! O conector em formato de "L" evita encaixes invertidos. Um cabo SATA conecta a placa-mãe ao HD ou SSD SATA, transferindo dados entre eles.',
                    wrong: 'Esse não é o cabo SATA. O cabo de dados SATA tem um formato em "L" e é fino. Conecta a placa-mãe a HDs e SSDs SATA para transferência de dados.'
                }
            }
        ];

        // ═══════════════════════════════
        // ESTADO
        // ═══════════════════════════════
        let current = 0;
        let score = 0;
        let wrong = 0;
        let answered = false;
        let results = [];

        // cores dos slots para legenda
        const slotColors = {
            cpu: '#F7732A', ram: '#4A9EE0', pcie: '#4A9EE0',
            atx: '#FFAD6F', m2: '#F7732A', sata: '#1AB078'
        };
        const slotNames = {
            cpu: 'Socket CPU', ram: 'Slots RAM', pcie: 'Slot PCIe x16',
            atx: 'Conector ATX 24-pin', m2: 'Slot M.2', sata: 'Conectores SATA'
        };

        // ═══════════════════════════════
        // INIT
        // ═══════════════════════════════
        function init() {
            buildLegend();
            renderStep();
        }

        function buildLegend() {
            const wrap = document.getElementById('legend-wrap');
            wrap.innerHTML = '';
            Object.keys(slotNames).forEach(k => {
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `<div class="legend-dot" style="background:${slotColors[k]}"></div><span>${slotNames[k]}</span>`;
                wrap.appendChild(item);
            });
        }

        // ═══════════════════════════════
        // RENDER STEP
        // ═══════════════════════════════
        function renderStep() {
            answered = false;
            const step = steps[current];

            // badge + progress
            document.getElementById('badge-step').textContent = `Etapa ${current + 1}/6`;
            document.getElementById('step-current').textContent = current + 1;
            document.getElementById('step-score-label').innerHTML = `✓ ${score} &nbsp;✗ ${wrong}`;
            document.getElementById('progress-fill').style.width = ((current / 6) * 100) + '%';

            // instrução
            document.getElementById('instr-text').textContent = step.instruction;
            document.getElementById('instr-hint').textContent = '💡 ' + step.hint;

            // destacar slot na placa-mãe
            highlightSlot(step);

            // opções
            renderOptions(step);

            // esconder feedback/botão
            const fb = document.getElementById('feedback-box');
            fb.style.display = 'none'; fb.className = 'feedback-box';
            const btn = document.getElementById('btn-next');
            btn.classList.remove('show'); btn.style.display = 'none';
        }

        function highlightSlot(step) {
            // remove destaques anteriores
            steps.forEach(s => {
                const el = document.getElementById(s.slotId);
                if (el) {
                    el.querySelectorAll('rect, circle').forEach(r => {
                        r.style.filter = '';
                    });
                }
            });
            // aplica brilho no slot atual
            const el = document.getElementById(step.slotId);
            if (el) {
                el.querySelectorAll('rect, circle').forEach(r => {
                    r.style.filter = `drop-shadow(0 0 6px ${step.highlight})`;
                });
            }
        }

        function renderOptions(step) {
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            // embaralha opções mantendo índice correto
            const idxs = [0, 1, 2, 3].sort(() => Math.random() - .5);
            idxs.forEach(origIdx => {
                const opt = step.options[origIdx];
                const card = document.createElement('div');
                card.className = 'opt-card';
                card.innerHTML = `
      <div class="opt-card-icon">${opt.svg}</div>
      <div class="opt-card-name">${opt.name}</div>`;
                card.addEventListener('click', () => selectOption(card, origIdx, step));
                grid.appendChild(card);
            });
        }

        // ═══════════════════════════════
        // SELECIONAR
        // ═══════════════════════════════
        function selectOption(card, chosenIdx, step) {
            if (answered) return;
            answered = true;

            const isCorrect = chosenIdx === step.correct;
            const cards = document.querySelectorAll('.opt-card');

            card.classList.add(isCorrect ? 'correct' : 'wrong');

            if (!isCorrect) {
                cards.forEach(c => {
                    if (c.querySelector('.opt-card-name').textContent === step.options[step.correct].name)
                        c.classList.add('correct');
                });
            }
            cards.forEach(c => c.classList.add('disabled'));

            if (isCorrect) { score++; placeComponent(step); }
            else wrong++;

            results.push({ step, correct: isCorrect });

            // feedback
            const fb = document.getElementById('feedback-box');
            fb.className = 'feedback-box ' + (isCorrect ? 'correct' : 'wrong');
            fb.innerHTML = `
    <div class="feedback-header">
      <span>${isCorrect ? '✅' : '❌'}</span>
      <strong>${isCorrect ? 'Encaixe perfeito!' : 'Componente errado!'}</strong>
    </div>
    <p class="feedback-text">${isCorrect ? step.feedback.correct : step.feedback.wrong}</p>`;
            fb.style.display = 'block';

            const btn = document.getElementById('btn-next');
            btn.textContent = current < 5 ? 'Próxima etapa →' : 'Ver resultado →';
            btn.classList.add('show');
            btn.style.display = 'flex';
        }

        function placeComponent(step) {
            const el = document.getElementById(step.placedId);
            if (!el) return;
            // remove snap-in das classes para reativar animação
            el.querySelectorAll('.snap-in').forEach(c => {
                c.classList.remove('snap-in');
                void c.offsetWidth; // reflow
                c.classList.add('snap-in');
            });
            el.setAttribute('display', '');
            // adiciona snap-in ao grupo
            el.style.animation = 'snapIn .45s cubic-bezier(.4,0,.2,1) both';
        }

        // ═══════════════════════════════
        // PRÓXIMA ETAPA
        // ═══════════════════════════════
        function nextStep() {
            current++;
            if (current >= 6) showResult();
            else {
                renderStep();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // ═══════════════════════════════
        // RESULTADO
        // ═══════════════════════════════
        function showResult() {
            document.getElementById('screen-game').style.display = 'none';
            document.getElementById('screen-result').style.display = 'block';
            document.getElementById('progress-fill').style.width = '100%';
            document.getElementById('badge-step').textContent = '6/6';
            window.scrollTo({ top: 0, behavior: 'smooth' });

            document.getElementById('result-num').textContent = score;

            const circumference = 364;
            const offset = circumference - (score / 6) * circumference;
            setTimeout(() => {
                const arc = document.getElementById('score-arc');
                arc.style.transition = 'stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)';
                arc.style.strokeDashoffset = offset;
                arc.style.stroke = score >= 5 ? '#1AB078' : score >= 3 ? '#F7732A' : '#E8445A';
            }, 100);

            let title, subtitle;
            if (score === 6) {
                title = '🏆 Montagem perfeita!';
                subtitle = 'Você encaixou todos os componentes corretamente. Está pronto para o laboratório real!';
            } else if (score >= 4) {
                title = '🎉 Muito bem!';
                subtitle = 'Quase tudo certo! Revise os barramentos que errou e tente novamente.';
            } else if (score >= 2) {
                title = '💪 Continue praticando!';
                subtitle = 'Você está aprendendo. Refaça a montagem prestando atenção nas dicas de cada slot.';
            } else {
                title = '📚 Vamos estudar mais!';
                subtitle = 'Não desanime! Revise os barramentos da placa-mãe no material da disciplina e tente de novo.';
            }
            document.getElementById('result-title').textContent = title;
            document.getElementById('result-subtitle').textContent = subtitle;

            const list = document.getElementById('breakdown-list');
            list.innerHTML = '';
            results.forEach((r, i) => {
                const row = document.createElement('div');
                row.className = 'breakdown-row';
                row.innerHTML = `
      <div class="breakdown-icon">${r.step.options[r.step.correct].svg}</div>
      <div class="breakdown-info">
        <div class="breakdown-name">${r.step.options[r.step.correct].name}</div>
        <div class="breakdown-slot">${slotNames[r.step.id]}</div>
      </div>
      <span class="breakdown-badge ${r.correct ? 'ok' : 'err'}">${r.correct ? '✓ Certo' : '✗ Errou'}</span>`;
                list.appendChild(row);
            });
        }

        // ═══════════════════════════════
        // RESET / NAV
        // ═══════════════════════════════
        function restartGame() {
            current = 0; score = 0; wrong = 0; answered = false; results = [];
            // esconde todos os placed
            steps.forEach(s => {
                const el = document.getElementById(s.placedId);
                if (el) el.setAttribute('display', 'none');
            });
            document.getElementById('screen-result').style.display = 'none';
            document.getElementById('screen-game').style.display = 'block';
            renderStep();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goBack() { history.back(); }
        function goHome() { window.location.href = 'index.html'; }

        // start
        init();
    </script>
</body>
